name: IIIF Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * TUE'

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run IIIF monitor
        run: npm run iiif-monitor

      - name: Upload monitor artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iiif-monitor-result
          path: artifacts/iiif-monitor-result.json
          if-no-files-found: warn
